<!DOCTYPE html>
<html>
  <head>
    <title>API de UsuÃ¡rios</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>body { margin: 0; padding: 0; }</style>
  </head>
  <body>
    <div id="redoc-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/redoc/bundles/redoc.standalone.js"></script>
    <script>
      var spec = {
  "openapi": "3.0.3",
  "info": {
    "title": "API de Usuários",
    "version": "1.0.0",
    "description": "API REST de gestão de usuários e famílias, orientada a eventos."
  },
  "servers": [
    {
      "url": "http://localhost:8082",
      "description": "Local"
    }
  ],
  "security": [
    {
      "bearerAuth": []
    }
  ],
  "tags": [
    {
      "name": "User",
      "description": "Gerenciamento do usuário autenticado"
    },
    {
      "name": "Family",
      "description": "Gerenciamento de família do usuário autenticado"
    }
  ],
  "paths": {
    "/api/v1/user": {
      "get": {
        "tags": [
          "User"
        ],
        "summary": "Obtém informações do usuário autenticado",
        "description": "Retorna os informações do usuario.",
        "operationId": "getUser",
        "responses": {
          "200": {
            "description": "Usuario retornado com sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UserResponse"
                },
                "example": {
                  "nome": "João",
                  "sobrenome": "Silva",
                  "email": "joao@email.com",
                  "emailVerificado": true
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        }
      },
      "put": {
        "tags": [
          "User"
        ],
        "summary": "Atualiza o usuário autenticado",
        "description": "Atualiza nome, sobrenome e email.",
        "operationId": "updateUser",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/UserUpdateRequest"
              },
              "example": {
                "nome": "João",
                "sobrenome": "Silva",
                "email": "joao@email.com"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Usuario atualizado com sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UserResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      }
    },
    "/api/v1/user/password": {
      "put": {
        "tags": [
          "User"
        ],
        "summary": "Altera a senha do usuário autenticado",
        "description": "Valida a senha atual via ROPC e redefine a nova senha via Admin API do Keycloak.",
        "operationId": "changePassword",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/PasswordChangeRequest"
              },
              "example": {
                "senhaAtual": "senhaAntiga123",
                "novaSenha": "novaSenha456",
                "confirmarNovaSenha": "novaSenha456"
              }
            }
          }
        },
        "responses": {
          "204": {
            "description": "Senha alterada com sucesso"
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      }
    },
    "/api/v1/user/lista": {
      "get": {
        "tags": [
          "User"
        ],
        "summary": "Lista usuários sem vínculo com família",
        "description": "Retorna uma lista de usuários que não pertencem a nenhuma família, disponíveis para serem adicionados.",
        "operationId": "getUsersWithoutFamily",
        "responses": {
          "200": {
            "description": "Lista de usuários retornada com sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/FamilyMemberResponse"
                  }
                },
                "example": [
                  {
                    "username": "maria123",
                    "nome": "Maria",
                    "sobrenome": "Santos",
                    "email": "maria@email.com",
                    "emailVerified": true,
                    "ehDeletavel": true
                  },
                  {
                    "username": "pedro456",
                    "nome": "Pedro",
                    "sobrenome": "Oliveira",
                    "email": "pedro@email.com",
                    "emailVerified": false,
                    "ehDeletavel": true
                  }
                ]
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        }
      }
    },
    "/api/v1/user/family": {
      "post": {
        "tags": [
          "Family"
        ],
        "summary": "Cria uma família",
        "description": "Cria uma nova família e adiciona o usuário autenticado como TITULAR.",
        "operationId": "createFamily",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateFamilyRequest"
              },
              "example": {
                "nome": "Família Silva"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Família criada",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/FamilyResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      },
      "get": {
        "tags": [
          "Family"
        ],
        "summary": "Obtém a família do usuário autenticado",
        "operationId": "getFamily",
        "responses": {
          "200": {
            "description": "Família retornada",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/FamilyResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      },
      "delete": {
        "tags": [
          "Family"
        ],
        "summary": "Remove a família completa",
        "description": "Remove a família e todos os vínculos dos membros. Apenas o titular pode executar esta ação.",
        "operationId": "deleteFamily",
        "responses": {
          "204": {
            "description": "Família removida com sucesso"
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      }
    },
    "/api/v1/user/family/members/{username}": {
      "post": {
        "tags": [
          "Family"
        ],
        "summary": "Adiciona um novo membro à família",
        "description": "Adiciona um usuário sem vínculo familiar à família do usuário autenticado. Apenas o titular pode adicionar membros.",
        "operationId": "addFamilyMember",
        "parameters": [
          {
            "$ref": "#/components/parameters/username"
          }
        ],
        "responses": {
          "201": {
            "description": "Membro adicionado com sucesso"
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      },
      "delete": {
        "tags": [
          "Family"
        ],
        "summary": "Remove um membro da família",
        "description": "Remove um membro da família do usuário autenticado.",
        "operationId": "removeFamilyMember",
        "parameters": [
          {
            "$ref": "#/components/parameters/username"
          }
        ],
        "responses": {
          "204": {
            "description": "Membro removido com sucesso"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "502": {
            "$ref": "#/components/responses/BadGateway"
          }
        }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "Token JWT obtido via Keycloak (dev-client)."
      }
    },
    "parameters": {
      "username": {
        "name": "username",
        "in": "path",
        "required": true,
        "description": "Username do usuário",
        "schema": {
          "type": "string",
          "description": "Username do usuário",
          "example": "joaosilva"
        }
      }
    },
    "responses": {
      "BadRequest": {
        "description": "Requisição Inválida",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorViolacaoResponse"
            },
            "example": {
              "status": 400,
              "error": "Requisição Inválida",
              "timestamp": "2026-05-03T19:00:00.000Z",
              "path": "/api/v1/user/password",
              "violacoes": [
                  {
                    "campo": "novaSenha",
                    "razao": "Nova Senha diferente da confirmação"
                  },
                  {
                    "campo": "confirmarNovaSenha",
                    "razao": "Confirmação de senha diferente da nova senha"
                  }
              ],
                "message": "Requisição contém erro de negócio."
            }
          }
        }
      },
      "Unauthorized": {
        "description": "Falha na autenticação. Token ausente, inválido ou expirado",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "status": 401,
              "error": "Não autorizado",
              "message": "Falha na autenticação. Token ausente, inválido ou expirado",
              "timestamp": "2026-05-03T19:00:00.000Z",
              "path": "/api/v1/user"
            }
          }
        }
      },
      "Forbidden": {
        "description": "Acesso negado",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "status": 403,
              "error": "Acesso negado",
              "message": "Você não tem permissão para acessar este recurso",
              "timestamp": "2026-05-03T19:00:00.000Z",
              "path": "/api/v1/user"
            }
          }
        }
      },
      "InternalServerError": {
        "description": "Erro interno do servidor",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "timestamp": "2026-05-03T19:00:00.000Z",
              "status": 500,
              "error": "Erro interno do servidor",
              "message": "Ocorreu um erro inesperado. Por favor, tente novamente mais tarde",
              "path": "/api/v1/user"
            }
          }
        }
      },
      "NotFound": {
        "description": "Não Encontrado",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "status": 404,
              "error": "Não Encontrado",
              "message": "Objeto não encontrado",
              "timestamp": "2026-05-03T19:00:00.000Z",
              "path": "/api/v1/user"
            }
          }
        }
      },
      "BadGateway": {
        "description": "Falha ao comunicar com o Keycloak",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "status": 502,
              "error": "Erro no keycloak",
              "message": "Não foi possível obter token do Keycloak",
              "timestamp": "2026-05-03T19:00:00.000Z",
              "path": "/api/v1/user"
            }
          }
        }
      }
    },
    "schemas": {
      "UserResponse": {
        "type": "object",
        "properties": {
          "nome": {
            "type": "string",
            "description": "Primeiro nome do usuário",
            "example": "João"
          },
          "sobrenome": {
            "type": "string",
            "description": "Sobrenome do usuário",
            "example": "Silva"
          },
          "email": {
            "type": "string",
            "format": "email",
            "description": "Endereço de e-mail do usuário",
            "example": "joao@email.com"
          },
          "emailVerificado": {
            "type": "boolean",
            "description": "Indica se o e-mail do usuário foi verificado",
            "example": true
          }
        }
      },
      "UserUpdateRequest": {
        "type": "object",
        "required": [
          "nome",
          "sobrenome",
          "email"
        ],
        "properties": {
          "nome": {
            "type": "string",
            "description": "Primeiro nome do usuário",
            "example": "João"
          },
          "sobrenome": {
            "type": "string",
            "description": "Sobrenome do usuário",
            "example": "Silva"
          },
          "email": {
            "type": "string",
            "format": "email",
            "description": "Endereço de e-mail do usuário",
            "example": "joao@email.com"
          }
        }
      },
      "PasswordChangeRequest": {
        "type": "object",
        "required": [
          "senhaAtual",
          "novaSenha",
          "confirmarNovaSenha"
        ],
        "properties": {
          "senhaAtual": {
            "type": "string",
            "description": "Senha atual do usuário",
            "example": "senhaAntiga123"
          },
          "novaSenha": {
            "type": "string",
            "description": "Nova senha desejada",
            "example": "novaSenha456"
          },
          "confirmarNovaSenha": {
            "type": "string",
            "description": "Confirmação da nova senha, deve ser idêntica a novaSenha",
            "example": "novaSenha456"
          }
        }
      },
      "CreateFamilyRequest": {
        "type": "object",
        "required": [
          "nome"
        ],
        "properties": {
          "nome": {
            "type": "string",
            "description": "Nome da família",
            "example": "Família Silva"
          }
        }
      },
      "FamilyResponse": {
        "type": "object",
        "properties": {
          "nome": {
            "type": "string",
            "description": "Nome da família",
            "example": "Família Silva"
          },
          "titular": {
            "type": "boolean",
            "description": "Indica se o usuário autenticado é o titular da família",
            "example": true
          },
          "membros": {
            "type": "array",
            "description": "Lista de membros da família, incluindo o titular",
            "items": {
              "$ref": "#/components/schemas/FamilyMemberResponse"
            }
          }
        }
      },
      "FamilyMemberResponse": {
        "type": "object",
        "properties": {
          "username": {
            "type": "string",
            "description": "Username do membro da família",
            "example": "joaosilva"
          },
          "nome": {
            "type": "string",
            "description": "Primeiro nome do membro",
            "example": "João"
          },
          "sobrenome": {
            "type": "string",
            "description": "Sobrenome do membro",
            "example": "Silva"
          },
          "email": {
            "type": "string",
            "format": "email",
            "description": "E-mail do membro",
            "example": "joao@email.com"
          },
          "emailVerified": {
            "type": "boolean",
            "description": "Indica se o e-mail do membro foi verificado",
            "example": true
          },
          "ehDeletavel": {
            "type": "boolean",
            "description": "Indica se o membro pode ser removido da família",
            "example": true
          }
        }
      },
      "ErrorResponse": {
        "type": "object",
        "properties": {
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "Data e hora do erro em UTC",
            "example": "2026-05-03T19:00:00.000Z"
          },
          "status": {
            "type": "integer",
            "description": "Código HTTP do erro",
            "example": 400
          },
          "error": {
            "type": "string",
            "description": "Descrição resumida do erro HTTP",
            "example": "Bad Request"
          },
          "message": {
            "type": "string",
            "description": "Mensagem detalhada do erro",
            "example": "Mensagem de erro"
          },
          "path": {
            "type": "string",
            "description": "Caminho do endpoint que gerou o erro",
            "example": "/api/v1/user"
          }
        }
      },
      "ErrorViolacaoResponse": {
        "type": "object",
        "properties": {
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "Data e hora do erro em UTC"
          },
          "status": {
            "type": "integer",
            "description": "Código HTTP do erro",
            "example": 400
          },
          "error": {
            "type": "string",
            "description": "Descrição resumida do erro HTTP",
            "example": "Bad Request"
          },
          "violacoes": {
            "type": "array",
            "description": "Lista de violações de regras de negócio que causaram o erro",
            "items": {
              "$ref": "#/components/schemas/ViolacaoResponse"
            }
          },
          "path": {
            "type": "string",
            "description": "Caminho do endpoint que gerou o erro",
            "example": "/api/v1/user"
          },
          "message": {
            "type": "string",
            "description": "Mensagem detalhada do erro",
            "example": "Mensagem de erro"
          }
        }
      },
      "ViolacaoResponse": {
        "type": "object",
        "properties": {
          "campo": {
            "type": "string",
            "description": "Campo que violou a regra de negócio",
            "example": "novaSenha"
          },
          "razao": {
            "type": "string",
            "description": "Razão da violação de regra de negócio",
            "example": "Nova Senha diferente da confirmação"
          }
        }
      }
    }
  }
};
      Redoc.init(spec, {}, document.getElementById('redoc-container'));
    </script>
  </body>
</html>
