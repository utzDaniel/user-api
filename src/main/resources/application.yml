server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: user-api
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=user;encrypt=true;trustServerCertificate=true}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:YourStrong!Passw0rd}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://localhost:61616}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:9999}/realms/${KEYCLOAK_REALM:development}

keycloak:
  admin:
    server-url: ${KEYCLOAK_URL:http://localhost:9999}
    realm: ${KEYCLOAK_REALM:development}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:dev-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false
  health:
    diskspace:
      enabled: false
    ping:
      enabled: false
    ssl:
      enabled: false
