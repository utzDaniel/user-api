version: '3.8'
services:
  app:
    build: .
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=keycloak;encrypt=true;trustServerCertificate=true
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      ACTIVEMQ_URL: tcp://host.docker.internal:61616
      KEYCLOAK_URL: http://host.docker.internal:9999
      KEYCLOAK_REALM: development
      KEYCLOAK_CLIENT_ID: dev-client
      KEYCLOAK_CLIENT_SECRET: change-me
